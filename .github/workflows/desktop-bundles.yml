name: Desktop bundles

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-bundles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test desktop and shared code
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22.13.0
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npx playwright install chrome
      - run: npm run test:ui
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  bundle:
    name: Bundle ${{ matrix.label }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            bundles: app,dmg
          - label: Windows
            os: windows-latest
            bundles: msi,nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22.13.0
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: npm ci

      - name: Build and upload bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: --bundles ${{ matrix.bundles }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: toposaic-[platform]-[arch]-[bundle]

      - name: Verify static MSVC runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installation = & $vswhere -latest -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          if (-not $installation) {
            throw "Could not find the Visual C++ build tools."
          }

          $dumpbin = Get-ChildItem "$installation\VC\Tools\MSVC" `
            -Filter dumpbin.exe -Recurse |
            Where-Object FullName -Match 'Hostx64\\x64\\dumpbin\.exe$' |
            Sort-Object FullName |
            Select-Object -Last 1
          if (-not $dumpbin) {
            throw "Could not find dumpbin.exe."
          }

          $imports = & $dumpbin.FullName /DEPENDENTS `
            "target\release\toposaic-desktop.exe" 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) {
            throw "dumpbin could not inspect the Windows executable."
          }
          $imports
          if ($imports -Match '(?i)(VCRUNTIME|MSVCP|CONCRT|api-ms-win-crt-|ucrtbase).*\.dll') {
            throw "The Windows executable still depends on an external MSVC runtime."
          }
